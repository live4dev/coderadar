version: "3.9"

services:
  coderadar:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - coderadar_db:/data/db
      - coderadar_repos:/data/repos_cache
    environment:
      DATABASE_URL: "sqlite:////data/db/coderadar.db"
      REPOS_CACHE_DIR: "/data/repos_cache"
      # Override with your credentials via .env or environment
      BITBUCKET_USERNAME: "${BITBUCKET_USERNAME:-}"
      BITBUCKET_APP_PASSWORD: "${BITBUCKET_APP_PASSWORD:-}"
      GITLAB_TOKEN: "${GITLAB_TOKEN:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker
    volumes:
      - coderadar_db:/data/db
      - coderadar_repos:/data/repos_cache
    environment:
      DATABASE_URL: "sqlite:////data/db/coderadar.db"
      REPOS_CACHE_DIR: "/data/repos_cache"
      BITBUCKET_USERNAME: "${BITBUCKET_USERNAME:-}"
      BITBUCKET_APP_PASSWORD: "${BITBUCKET_APP_PASSWORD:-}"
      GITLAB_TOKEN: "${GITLAB_TOKEN:-}"
    depends_on:
      coderadar:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  coderadar_db:
  coderadar_repos:
  loki_data:
  grafana_data:
